[theme]
primaryColor = "#e07a5f"
backgroundColor = "#fff9f4"
secondaryBackgroundColor = "#f4ebe2"
textColor = "#1f2937"
font = "sans serif"

[client]
showErrorDetails = false
showSidebarNavigation = true

toolbarMode = "minimal"

[logger]
level = "info"

[server]
maxUploadSize = 200
enableXsrfProtection = true
headless = true

[runner]
magicEnabled = true
